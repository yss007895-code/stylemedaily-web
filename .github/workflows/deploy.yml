name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run build

      - name: Inject static redirects (post-build)
        run: |
          mkdir -p out/guides/office-siren-style-guide
          cat > out/guides/office-siren-style-guide/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html>
          <head>
          <meta http-equiv="refresh" content="0;url=/guides/the-ultimate-office-siren-style-guide-how-to-get-the-viral-tiktok-look/">
          <link rel="canonical" href="https://stylemedaily.org/guides/the-ultimate-office-siren-style-guide-how-to-get-the-viral-tiktok-look/">
          <title>Redirecting...</title>
          </head>
          <body>
          <script>window.location.replace('/guides/the-ultimate-office-siren-style-guide-how-to-get-the-viral-tiktok-look/')</script>
          <p>Redirecting to <a href="/guides/the-ultimate-office-siren-style-guide-how-to-get-the-viral-tiktok-look/">Office Siren Style Guide</a>...</p>
          </body>
          </html>
          REDIRECT

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
